# SmartOLT Automate installer — docker-compose template.
#
# This file ships with the public installer repo and references prebuilt
# images from Docker Hub. No source code from the main project is included.
# To build images from source, see the upstream repo:
#   https://github.com/asotonet/smartolt-automate
#
# All values come from .env or are referenced via ${VAR} syntax.

services:
  smartolt-automate:
    image: ${SMARTOLT_IMAGE:-asoton/smartolt-automate:v0.4.9}
    pull_policy: ${PULL_POLICY:-always}
    container_name: smartolt-automate
    restart: unless-stopped
    environment:
      # SmartOLT connection is optional at boot. The scheduler stays
      # idle until the admin sets these from the panel.
      SMARTOLT_BASE_URL: "${SMARTOLT_BASE_URL:-}"
      SMARTOLT_API_KEY: "${SMARTOLT_API_KEY:-}"
      OLTS_CONFIG_JSON: "${OLTS_CONFIG_JSON:-}"
      SCHEDULER_TIMEZONE: "${SCHEDULER_TIMEZONE:-America/Costa_Rica}"
      SCHEDULER_HOUR_START: "${SCHEDULER_HOUR_START:-2}"
      SCHEDULER_HOUR_END: "${SCHEDULER_HOUR_END:-3}"
      # Traefik service name (so the core scheduler can ping Traefik if needed).
      PROXY_SERVICE_NAME: "${PROXY_SERVICE_NAME:-smartolt-automate-traefik}"
      WEB_SERVICE_NAME: "${WEB_SERVICE_NAME:-smartolt-automate-web}"
    volumes:
      - logs:/app/logs
      - state:/app/state
      - data:/app/data
      - ./configs:/app/configs
    # No host port mapping: the backend core is internal. Traefik reaches
    # it via the compose network when needed.
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).status == 200 else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    image: ${SMARTOLT_IMAGE:-asoton/smartolt-automate:v0.4.9}
    pull_policy: ${PULL_POLICY:-always}
    container_name: smartolt-automate-web
    restart: unless-stopped
    entrypoint: ["uvicorn"]
    command: ["smartolt_automate.web.app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      # SmartOLT connection is optional at boot.
      SMARTOLT_BASE_URL: "${SMARTOLT_BASE_URL:-}"
      SMARTOLT_API_KEY: "${SMARTOLT_API_KEY:-}"
      INITIAL_ADMIN_USERNAME: "${INITIAL_ADMIN_USERNAME:?Set INITIAL_ADMIN_USERNAME in .env}"
      INITIAL_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD:?Set INITIAL_ADMIN_PASSWORD in .env}"
      # Internal URL of the backend (port 8080 on the `smartolt-automate`
      # service in the compose network). The web tier proxies requests
      # like /api/service/status to this URL to forward to the backend
      # scheduler. The default in smartolt_automate/config.py is
      # http://127.0.0.1:8080, which inside the web container has no
      # listener (the health server only runs in the backend container)
      # and surfaces as 'upstream unreachable' in the Service Status
      # card. Pin to the compose DNS name.
      WEB_INTERNAL_BASE_URL: "http://smartolt-automate:8080"
      PROXY_HTTPS_PORT: "${PROXY_HTTPS_PORT:-443}"
      COMPOSE_PROJECT_NAME: "${COMPOSE_PROJECT_NAME:-smartolt_api_automate}"
      PROXY_SERVICE_NAME: "${PROXY_SERVICE_NAME:-smartolt-automate-traefik}"
    volumes:
      - logs:/app/logs:ro
      - state:/app/state:ro
      - data:/app/data
      - ./configs:/app/configs
    # No host port mapping: the web tier (FastAPI) is internal. Traefik
    # routes /api/* to it via the compose network.
    expose:
      - "8000"
    depends_on:
      smartolt-automate:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/service/livez', timeout=3).status == 200 else 1)\""
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Traefik routes /api/* to this container when a hostname is configured.
    # When SMARTOLT_PUBLIC_DOMAIN is empty we set traefik.enable=false so
    # Traefik ignores the container entirely (the operator is testing
    # locally without a public domain and uses the host port mappings).
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.docker.network=smartolt_api_automate_default"
      - "traefik.http.routers.web-api.rule=Host(`${SMARTOLT_PUBLIC_DOMAIN:-disabled.example}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.web-api.entrypoints=websecure"
      - "traefik.http.routers.web-api.tls=true"
      - "traefik.http.routers.web-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.web-api.loadbalancer.server.port=8000"

  frontend:
    image: ${SMARTOLT_FRONTEND_IMAGE:-asoton/smartolt-automate-frontend:v0.4.9}
    pull_policy: ${PULL_POLICY:-always}
    container_name: smartolt-automate-frontend
    restart: unless-stopped
    # Host port mapping. Controlled by EXPOSE_FRONTEND_DIRECTLY:
    #   true  → bound on all interfaces (0.0.0.0); reachable directly
    #           via http://HOST:8080/ for LAN/test installs.
    #   false → bound to 127.0.0.1 only; only Traefik can reach it
    #           via the compose network. Use this for production
    #           deployments where the operator wants Traefik to be the
    #           only public entry point.
    ports:
      - mode: ingress
        target: 80
        published: "${FRONTEND_PORT:-8080}"
        protocol: tcp
        host_ip: "${FRONTEND_BIND_IP:-0.0.0.0}"
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Traefik serves this as the catch-all Host rule when a public
    # domain is configured. /api/* is matched first by the web router.
    # When SMARTOLT_PUBLIC_DOMAIN is empty the router is disabled (the
    # operator is testing locally and uses the host port mapping instead).
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.docker.network=smartolt_api_automate_default"
      - "traefik.http.routers.frontend.rule=Host(`${SMARTOLT_PUBLIC_DOMAIN:-disabled.example}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  traefik:
    image: ${PROXY_IMAGE:-asoton/smartolt-automate-traefik:v0.4.9}
    pull_policy: ${PULL_POLICY:-always}
    container_name: smartolt-automate-traefik
    # The 'traefik' profile is only activated by `./smartolt.sh deploy` for
    # profiles that need it (lan, https-public). Profiles that put another
    # reverse proxy in front of the stack (https-behind-external-proxy) or
    # that don't need HTTPS at all (frontend-only) skip this service by
    # omitting `--profile traefik` from the docker compose invocation.
    profiles: ["traefik"]
    restart: unless-stopped
    command: ["traefik", "--configFile=/etc/traefik/traefik.yml"]
    environment:
      SMARTOLT_PUBLIC_DOMAIN: "${SMARTOLT_PUBLIC_DOMAIN:-}"
      ACME_EMAIL: "${SMARTOLT_LETSENCRYPT_EMAIL:-admin@example.com}"
      DASHBOARD: "${TRAEFIK_DASHBOARD:-false}"
    volumes:
      # Traefik needs the Docker socket to watch for new containers and
      # read their labels. Same trade-off as the previous certbot setup.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/etc/traefik
    ports:
      # Public HTTPS entrypoint.
      - "${PROXY_HTTPS_PORT:-443}:443"
      # Plain HTTP — Traefik handles the HTTP→HTTPS redirect internally.
      - "80:80"
      # Optional dashboard (set TRAEFIK_DASHBOARD=1 to enable).
      - "${TRAEFIK_DASHBOARD_PORT:-8081}:8081"
    healthcheck:
      # Traefik 3.x doesn't expose a /ping endpoint. Check that the
      # process is alive by hitting the plain-HTTP entrypoint and
      # following its redirect to the HTTPS entrypoint. --no-check-cert
      # accepts the default self-signed cert until Traefik issues a
      # real Let's Encrypt cert (HTTP-01 ACME flow).
      test: ["CMD-SHELL", "wget -qO- --spider --max-redirect=5 --no-check-certificate http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - frontend
      - web
    # Catch-all routers for local testing (when SMARTOLT_PUBLIC_DOMAIN
    # is empty). They match Host=localhost and Host=127.0.0.1 — the most
    # common browser targets on a local install. When the operator sets
    # SMARTOLT_PUBLIC_DOMAIN, the per-container routers (frontend /
    # web-api) take over and these become no-ops.
    #
    # The router points at the existing 'frontend' service that the
    # frontend container already declares via its own labels, so we
    # don't need to re-declare it here.
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.docker.network=smartolt_api_automate_default"
      - "traefik.http.routers.localhost.rule=Host(`localhost`) || Host(`127.0.0.1`)"
      - "traefik.http.routers.localhost.entrypoints=websecure"
      - "traefik.http.routers.localhost.tls=true"
      - "traefik.http.routers.localhost.tls.certresolver=letsencrypt"
      - "traefik.http.routers.localhost.service=frontend@docker"
      - frontend
      - web

volumes:
  logs:
  state:
  data:
  traefik_acme: